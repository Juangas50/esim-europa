<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Crema with Navy accent -->
  <rect width="1200" height="627" fill="#FAF7F2"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="80" height="627" fill="#1B2F4E"/>

  <!-- Main content -->
  <g transform="translate(150, 80)">
    <!-- Headline -->
    <text x="0" y="0" font-family="'DM Serif Display', serif" font-size="56" font-weight="900" fill="#1B2F4E">
      <tspan x="0" dy="0">Internet sin roaming</tspan>
      <tspan x="0" dy="70">en 34+ países europeos</tspan>
    </text>

    <!-- Subheadline -->
    <text x="0" y="220" font-family="Arial, sans-serif" font-size="28" fill="#64748B" font-weight="600">
      Cobertura instantánea • Planes desde USD $4.99
    </text>

    <!-- Key points -->
    <g transform="translate(0, 310)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" fill="#1B2F4E" font-weight="bold">
        <tspan x="0" dy="0">✓ Activá en minutos</tspan>
        <tspan x="0" dy="35">✓ Sin contrato</tspan>
        <tspan x="0" dy="35">✓ 5G en Europa</tspan>
      </text>
    </g>
  </g>

  <!-- RUTA34 logo and CTA (right side) -->
  <g transform="translate(900, 200)">
    <rect x="0" y="0" width="220" height="220" fill="#C9973A" rx="20"/>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#1B2F4E" text-anchor="middle">
      RUTA
    </text>
    <text x="110" y="140" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#FAF7F2" text-anchor="middle">
      34
    </text>
    <text x="110" y="175" font-family="Arial, sans-serif" font-size="14" fill="#1B2F4E" text-anchor="middle" font-weight="bold">
      Telecom
    </text>
  </g>
</svg>
